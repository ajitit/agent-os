# File: docker-compose.yml
# 
# Purpose:
# Defines the multi-container Docker application environment for local development
# and deployment of AgentOS.
# 
# Key Functionalities:
# - Orchestrate the PostgreSQL database, Redis cache, and Python backend services
# - Map ports for local access and configure persistent volumes
# - Set environment variables connecting the services
# - Define health checks for resilient startup
# 
# Inputs:
# - Docker configuration blocks and local .env files (if any)
# 
# Outputs:
# - Running Docker container network
# 
# Interacting Files / Modules:
# - backend/Dockerfile

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: agentos
      POSTGRES_PASSWORD: agentos
      POSTGRES_DB: agentos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://agentos:agentos@postgres:5432/agentos
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/agentos-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
