# File: docker-compose.yml
# 
# Purpose:
# Defines the multi-container Docker application environment for local development
# and deployment of Vishwakarma.
# 
# Key Functionalities:
# - Orchestrate the PostgreSQL database, Redis cache, and Python backend services
# - Map ports for local access and configure persistent volumes
# - Set environment variables connecting the services
# - Define health checks for resilient startup
# 
# Inputs:
# - Docker configuration blocks and local .env files (if any)
# 
# Outputs:
# - Running Docker container network
# 
# Interacting Files / Modules:
# - backend/Dockerfile

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: agentos
      POSTGRES_PASSWORD: agentos
      POSTGRES_DB: agentos
    ports:
      - "5432:5432"
    # Optimization: Limit resources to prevent laptop slowdown
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s  # initdb takes ~32s under 0.5 CPU limit; 60s gives 2× safety margin

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    # This block is mandatory for the backend's 'depends_on' to work
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    # Volume mount removed: bind mounts from Windows to WSL2 Docker containers
    # can appear empty, overriding the image files copied by the Dockerfile.
    # The image already has the backend files via COPY backend/ ./backend/.
    # For hot-reload during dev, run uvicorn directly outside Docker instead.
    environment:
      DATABASE_URL: postgresql://agentos:agentos@postgres:5432/agentos
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Recommendation: Run frontend natively on your laptop (npm run dev) 
  # to save 1GB+ of RAM and massive disk space from node_modules in Docker.
  # If you must use Docker, use this slimmed version:
  frontend:
    build:
      context: ./frontend/agentos-ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    profiles: ["debug"] # Only starts if you explicitly call it
